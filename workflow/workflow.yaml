version: 2
state_machine:
  command_entrypoint: ./scripts/command-dispatch.sh
  stage_gate_command: approve stage <stage>
  stages:
    intake:
      required_artifacts:
        - <workspace>/01-intake/request.md
        - <workspace>/00-governance/stack-lock.yaml
      approval_gate: human_intake_approval
      next_responsible_role: project-manager
      invariants:
        stack_locked: false_or_true
        scope_locked: false
    discovery:
      required_artifacts:
        - <workspace>/02-discovery/Project_Charter.md
        - <workspace>/02-discovery/Scope_In.md
        - <workspace>/02-discovery/Scope_Out.md
        - <workspace>/02-discovery/Open_Questions.md
      approval_gate: human_scope_approval
      next_responsible_role: business-analyst
      invariants:
        stack_locked: true
    analysis:
      required_artifacts:
        - <workspace>/03-analysis/BRD.md
        - <workspace>/03-analysis/User_Stories.md
        - <workspace>/03-analysis/Business_Rules.md
        - <workspace>/03-analysis/Domain_Glossary.md
      approval_gate: human_requirements_approval
      next_responsible_role: solution-architect
      invariants:
        stack_locked: true
        scope_locked: true
    architecture:
      required_artifacts:
        - <workspace>/04-architecture/Architecture.md
        - <workspace>/04-architecture/NFR.md
        - <workspace>/04-architecture/C4_Diagrams.md
        - <workspace>/04-architecture/adr/ADR-001.md
      approval_gate: human_architecture_approval
      next_responsible_role: ui-ux-designer
      invariants:
        stack_locked: true
        scope_locked: true
    design:
      required_artifacts:
        - <workspace>/05-design/UX_Flows.md
        - <workspace>/05-design/Wireframes.md
        - <workspace>/05-design/Component_Map.md
      approval_gate: human_design_approval
      next_responsible_role: project-manager
      invariants:
        stack_locked: true
        scope_locked: true
    planning:
      required_artifacts:
        - <workspace>/06-planning/Roadmap.md
        - <workspace>/06-planning/Epics.md
        - <workspace>/06-planning/Tickets.md
        - <workspace>/06-planning/Sprint_Plan.md
      approval_gate: human_plan_approval
      next_responsible_role: software-developer
      invariants:
        stack_locked: true
        scope_locked: true
    delivery:
      required_artifacts:
        - <workspace>/07-delivery/epic-1/epic.md
        - <workspace>/07-delivery/epic-1/ticket-1/ticket.md
        - <workspace>/07-delivery/epic-1/ticket-1/implementation-plan.md
        - <workspace>/07-delivery/epic-1/ticket-1/handoff.md
        - <workspace>/07-delivery/epic-1/ticket-1/review-report.md
      approval_gate: human_ticket_approval
      next_responsible_role: sdet
      invariants:
        stack_locked: true
        scope_locked: true
    quality:
      required_artifacts:
        - <workspace>/08-quality/Test_Strategy.md
        - <workspace>/08-quality/Acceptance_Test_Cases.md
        - <workspace>/08-quality/Regression_Checklist.md
        - <workspace>/08-quality/QA_Reports.md
        - <workspace>/08-quality/Manual_Test_Script.md
        - <workspace>/08-quality/Manual_Test_Execution_Log.md
        - <workspace>/08-quality/Manual_Test_Feedback.md
        - <workspace>/08-quality/Manual_Test_Issues.md
        - <workspace>/09-release/Deployment_Readiness_Evidence.md
      approval_gate: human_quality_approval
      next_responsible_role: project-manager
      invariants:
        stack_locked: true
        scope_locked: true
        deployment_contract: required
        manual_test_gate_status: approved_required_for_release
        open_manual_issues: 0_required_for_release_transition
    release:
      required_artifacts:
        - <workspace>/09-release/Release_Readiness.md
        - <workspace>/09-release/Release_Notes.md
        - <workspace>/09-release/Known_Issues.md
        - <workspace>/infra/deploy/docker-compose.yml
      approval_gate: human_release_approval
      next_responsible_role: project-manager
      invariants:
        stack_locked: true
        scope_locked: true
        deployment_contract: required

  allowed_transitions:
    intake: [discovery, blocked, cancelled]
    discovery: [analysis, blocked, cancelled]
    analysis: [architecture, blocked, cancelled]
    architecture: [design, blocked, cancelled]
    design: [planning, blocked, cancelled]
    planning: [delivery, blocked, cancelled]
    delivery: [quality, blocked, cancelled]
    quality: [release, blocked, cancelled]
    release: [released, blocked, cancelled]

  terminal_states:
    - released
    - blocked
    - cancelled
